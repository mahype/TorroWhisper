[graph]
all-features = false
no-default-features = false

[licenses]
confidence-threshold = 0.9
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "Unlicense",
    # Donny itself is GPL-3.0-or-later; the workspace crates declare it.
    "GPL-3.0-or-later",
]

# mp3lame-encoder / mp3lame-sys wrap LAME (LGPL-3.0) for MP3 export. A
# GPL-3.0 application may incorporate an LGPL-3.0 library, and shipping the
# full app source under GPL inherently satisfies the LGPL relinking duty, so
# the exception is scoped to exactly those two crates rather than allowing
# LGPL workspace-wide.
exceptions = [
    { name = "mp3lame-encoder", allow = ["LGPL-3.0"] },
    { name = "mp3lame-sys", allow = ["LGPL-3.0"] },
]

[advisories]
yanked = "warn"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"
deny = []
skip = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
